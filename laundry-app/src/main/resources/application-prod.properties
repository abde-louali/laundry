# MySQL Database (Railway injects these)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
spring.jwt.secret=${JWT_SECRET}
spring.jwt.expiration=${JWT_EXPIRATION:3600000}
spring.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:/app/uploads}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator health check (Railway needs this)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Server port (Railway injects PORT)
server.port=${PORT:8080}

# Logging
logging.level.root=WARN
